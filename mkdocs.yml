site_name: Qmes
site_description: >-
  Quantum Meta-learning for Encoding Selection — recommends quantum encoding
  circuits for tabular datasets without quantum evaluation at inference time.
site_url: https://tungduy1704.github.io/Qmes
repo_url: https://github.com/tungduy1704/Qmes
repo_name: tungduy1704/Qmes
edit_uri: edit/main/docs/

strict: true
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking      
    - toc.follow               
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
      - Architecture: architecture.md
      - Circuit Pool: circuit_pool.md
      - Meta-features: meta_features.md
      - Validation: validation.md
  - Advanced Usage: advanced_usage.md
  - API Reference:
      - Overview: api/index.md
      - Inference: api/inference.md
      - Extractors: api/extractors.md
      - Evaluators: api/evaluators.md
      - Recommender: api/recommender.md
      - Circuits: api/circuits.md
  - Changelog: changelog.md


plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true    
            show_symbol_type_toc: true         
            separate_signature: true           
            signature_crossrefs: true          
            docstring_section_style: table     
            members_order: source
            filters: ["!^_"]                 

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
  - admonition
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
